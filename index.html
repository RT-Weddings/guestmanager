<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Guest Manager — Roberta Torresan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--g:#9E7C4E;--d:#1A1A1A;--cr:#FAF8F5;--a:#B8956A;--b:#E8E3DC;--ff:'DM Sans',sans-serif;--pf:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--ff);background:#fff;color:var(--d);min-height:100vh}
button{font-family:var(--ff);cursor:pointer;transition:all .2s}button:active{transform:scale(.97)}input,select,textarea{font-family:var(--ff);outline:none}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cr);padding:20px}
.lc{background:#fff;border-radius:20px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08);text-align:center;border:1px solid var(--b)}
.lc img{max-width:200px;margin-bottom:16px}.lc h2{font-family:var(--pf);font-size:20px;margin-bottom:4px}
.lc .sub{color:#999;font-size:12px;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}
.lc input{width:100%;padding:12px 16px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;margin-bottom:12px;background:#FAFAF7}
.lc input:focus{border-color:var(--g)}.lc .bg{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--g),var(--a));color:#fff;font-size:14px;font-weight:700;margin-top:6px}
.lc .er{color:#C62828;font-size:12px;margin-top:8px}.lc .hn{color:#BBB;font-size:10px;margin-top:12px;line-height:1.5}
.ah{background:#fff;border-bottom:1px solid var(--b);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.ah img{height:36px}.ui{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.ub{font-size:11px;color:#888;background:#F4F0EB;padding:4px 12px;border-radius:8px}
.bs{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;border:1.5px solid var(--b);background:#fff;color:#666}.bs:hover{border-color:var(--g);color:var(--g)}
.bd{border-color:#FCA5A5;background:#FEF2F2;color:#C62828}
.mn{max-width:960px;margin:0 auto;padding:20px 16px 80px}.cd{background:#fff;border-radius:16px;border:1px solid var(--b);box-shadow:0 2px 8px rgba(0,0,0,.04);padding:20px;margin-bottom:14px}
.wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:20px}
.wt{background:#fff;border-radius:16px;border:1.5px solid var(--b);padding:18px;cursor:pointer;transition:all .2s}.wt:hover{border-color:var(--g);box-shadow:0 4px 16px rgba(158,124,78,.12)}
.wt h3{font-family:var(--pf);font-size:16px;margin-bottom:4px}.wt .mt{font-size:11px;color:#999}.wt .sts{display:flex;gap:12px;margin-top:10px}
.wt .st{text-align:center}.wt .sv{font-size:18px;font-weight:800;color:var(--g)}.wt .sl{font-size:9px;color:#AAA;text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}.tab{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;border:1.5px solid var(--b);background:#fff;color:#888}
.tab.act{border-color:var(--g);background:var(--g);color:#fff}
.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{padding:10px 12px;text-align:left;font-weight:700;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1.5px solid var(--b);background:#FAFAF7}
.tbl td{padding:10px 12px;border-bottom:1px solid #F4F0EB;color:#555}.tbl tr:hover td{background:#FDFBF8}
.bge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.bc{background:#E8F5E9;color:#2E7D32}.bp{background:#FFF8E1;color:#F57F17}.bx{background:#FFEBEE;color:#C62828}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fgi{margin-bottom:10px}.fgi label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.fgi input,.fgi select,.fgi textarea{width:100%;padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;background:#FAFAF7}
.fgi input:focus,.fgi select:focus{border-color:var(--g)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:#fff;border-radius:20px;max-width:520px;width:100%;max-height:90vh;overflow:auto;padding:24px;border:1px solid var(--b)}
.md h3{font-family:var(--pf);font-size:18px;margin-bottom:16px}
.sb{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.kpi{text-align:center;flex:1 1 70px;padding:12px 8px;background:#FDFBF8;border-radius:12px;border:1px solid var(--b)}.kv{font-size:22px;font-weight:800;color:var(--g)}
.kl{font-size:9px;color:#AAA;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.eb{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;background:#FFEBEE;color:#C62828;margin-left:6px}
/* Tables view */
.tv-grid{display:flex;flex-wrap:wrap;gap:12px}.tv-tbl{background:#FDFBF8;border:1.5px solid var(--b);border-radius:14px;padding:14px;min-width:200px;flex:1 1 220px;max-width:300px}
.tv-tbl.drag-over{border-color:var(--g);background:#FBF7F0;box-shadow:0 0 0 2px rgba(158,124,78,.2)}
.tv-tbl h4{font-size:13px;font-weight:700;color:var(--d);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tv-tbl h4 span{font-size:10px;color:var(--g);font-weight:600;background:rgba(158,124,78,.1);padding:2px 8px;border-radius:8px}
.tv-guest{background:#fff;border:1px solid var(--b);border-radius:8px;padding:6px 10px;margin-bottom:4px;font-size:11px;cursor:grab;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.tv-guest:active{cursor:grabbing;opacity:.6;transform:scale(.96)}.tv-guest .gn{font-weight:600;color:var(--d)}.tv-guest .gd{font-size:9px;color:#BBB}
.tv-unassigned{background:#F8F6F3;border:1.5px dashed var(--b);border-radius:14px;padding:14px;min-width:200px;flex:1 1 260px}
.tv-unassigned.drag-over{border-color:var(--g);background:#FBF7F0}
/* Timeline */
.tl-item{display:flex;gap:14px;margin-bottom:0;position:relative}
.tl-line{width:2px;background:var(--b);position:absolute;top:24px;bottom:-14px;left:11px}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex-shrink:0;z-index:1}
.tl-body{flex:1;padding-bottom:20px}.tl-time{font-size:13px;font-weight:700;color:var(--d)}.tl-title{font-size:12px;color:var(--g);font-weight:600;margin-top:2px}
.tl-note{font-size:11px;color:#999;margin-top:3px;line-height:1.4}
@media(max-width:600px){.fg{grid-template-columns:1fr}.wg{grid-template-columns:1fr}.tv-grid{flex-direction:column}}
</style>
</head>

function exportPDF(w){const g=w.guests||[];const s=wStats(w);const cf=g.filter(x=>x.status==='confirmed'),pn=g.filter(x=>x.status==='pending'),dc=g.filter(x=>x.status==='declined');
  let h=`<html><head><style>body{font-family:'Helvetica Neue',sans-serif;padding:40px;color:#1A1A1A}h1{font-size:22px;margin-bottom:4px}.sub{color:#888;font-size:12px;margin-bottom:20px}.sts{display:flex;gap:16px;margin-bottom:20px}.st{text-align:center;padding:10px 16px;background:#F8F6F3;border-radius:8px}.stv{font-size:22px;font-weight:800;color:#9E7C4E}.stl{font-size:9px;color:#999;text-transform:uppercase}table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px}th{padding:7px;text-align:left;border-bottom:2px solid #E8E3DC;font-size:9px;text-transform:uppercase;color:#888}td{padding:6px 7px;border-bottom:1px solid #F0ECE6}h3{margin:16px 0 6px;font-size:13px;color:#9E7C4E}.ft{margin-top:24px;font-size:9px;color:#BBB;text-align:center}</style></head><body>`;
  h+=`<h1>${w.couple||'Wedding'}</h1><div class="sub">${fmtLong(w.date)} ${w.venue?'· '+w.venue:''}</div>`;
  h+=`<div class="sts"><div class="st"><div class="stv">${s.total}</div><div class="stl">Total</div></div><div class="st"><div class="stv">${s.conf}</div><div class="stl">Confirmed</div></div><div class="st"><div class="stv">${s.pax}</div><div class="stl">Pax</div></div><div class="st"><div class="stv">${s.pend}</div><div class="stl">Pending</div></div><div class="st"><div class="stv">${s.decl}</div><div class="stl">Declined</div></div></div>`;
  const mt=(list,title)=>{if(!list.length)return'';let t=`<h3>${title} (${list.length})</h3><table><tr><th>Name</th><th>Email</th><th>Phone</th><th>+1</th><th>Table</th><th>Diet</th><th>Notes</th></tr>`;list.forEach(x=>{t+=`<tr><td>${x.name||''}</td><td>${x.email||''}</td><td>${x.phone||''}</td><td>${x.plusOnes||0}</td><td>${x.table||''}</td><td>${x.diet||''}</td><td>${x.notes||''}</td></tr>`});return t+'</table>'};
  h+=mt(cf,'✅ Confirmed')+mt(pn,'⏳ Pending')+mt(dc,'❌ Declined');
  if(w.timeline&&w.timeline.length){h+='<h3>📋 Timeline</h3><table><tr><th>Time</th><th>Event</th><th>Notes</th><th>Team</th></tr>';w.timeline.forEach(t=>{h+=`<tr><td>${t.time||''}</td><td>${t.title||''}</td><td>${t.notes||''}</td><td>${t.who||''}</td></tr>`});h+='</table>'}
  h+=`<div class="ft">Roberta Torresan Wedding Guest Manager · ${new Date().toLocaleDateString()}</div></body></html>`;
  const win=window.open('','_blank');if(win){win.document.write(h);win.document.close();setTimeout(()=>win.print(),500)}
}
function exportCSV(w){const g=w.guests||[];const esc=v=>{const s=String(v||'');return s.includes(',')||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s};
  const csv=['Name,Email,Phone,Status,Plus Ones,Table,Diet,Notes',...g.map(x=>[x.name,x.email,x.phone,x.status,x.plusOnes,x.table,x.diet,x.notes].map(esc).join(','))].join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${(w.couple||'wedding').replace(/\s+/g,'_')}_guests.csv`;a.click()}

/* ══════ DASHBOARD ══════ */
function rDashboard(w,g,s){
  const confPct=s.total>0?Math.round(s.conf/s.total*100):0;
  const pendPct=s.total>0?Math.round(s.pend/s.total*100):0;
  const declPct=s.total>0?Math.round(s.decl/s.total*100):0;
  // Donut SVG
  const segs=[{pct:confPct,color:'#2E7D32',label:'Confirmed'},{pct:pendPct,color:'#F59E0B',label:'Pending'},{pct:declPct,color:'#C62828',label:'Declined'}];
  let donut='<svg width="140" height="140" viewBox="0 0 140 140">';
  let cum=0;segs.forEach(seg=>{const p=seg.pct/100;if(p<=0)return;const st=cum;cum+=p;const r=55,cx=70,cy=70;
    const a1=st*2*Math.PI-Math.PI/2,a2=(st+p)*2*Math.PI-Math.PI/2;const lg=p>.5?1:0;
    donut+=`<path d="M ${cx} ${cy} L ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 ${lg} 1 ${cx+r*Math.cos(a2)} ${cy+r*Math.sin(a2)} Z" fill="${seg.color}" stroke="#fff" stroke-width="2"/>`;
  });
  donut+='<circle cx="70" cy="70" r="32" fill="#fff"/><text x="70" y="66" text-anchor="middle" font-size="9" fill="#999" font-family="DM Sans">TOTAL</text><text x="70" y="80" text-anchor="middle" font-size="16" fill="#1A1A1A" font-weight="700" font-family="DM Sans">'+s.total+'</text></svg>';

  // Status bars
  const bar=(label,val,max,color)=>{const pct=max>0?val/max*100:0;return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="font-weight:600;color:#555">${label}</span><span style="font-weight:700;color:${color}">${val}</span></div><div style="height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width .5s"></div></div></div>`};
  const mx=Math.max(s.conf,s.pend,s.decl,1);

  // Diet stats
  const diets={};g.filter(x=>x.diet&&x.status!=='declined').forEach(x=>{diets[x.diet]=(diets[x.diet]||0)+1});
  let dietHtml='';Object.entries(diets).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{dietHtml+=bar(d,n,g.length,'var(--g)')});

  // Days until
  const du=dfn(w.date);
  const duHtml=du!==null&&du>0?`<div class="cd" style="text-align:center;background:linear-gradient(135deg,var(--d),#2D2520);color:#fff;border:none"><div style="font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">Days Until Wedding</div><div style="font-size:42px;font-weight:700;color:var(--g);font-family:var(--pf)">${du}</div><div style="font-size:11px;opacity:.5">${fmtLong(w.date)}</div></div>`:'';

  return`${duHtml}<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px">RSVP Status</div>
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><div>${donut}</div><div style="flex:1;min-width:120px">${bar('✅ Confirmed',s.conf,mx,'#2E7D32')}${bar('⏳ Pending',s.pend,mx,'#F59E0B')}${bar('❌ Declined',s.decl,mx,'#C62828')}</div></div></div>
    <div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Dietary Requirements</div>${dietHtml||'<div style="color:#BBB;font-size:12px;text-align:center;padding:20px">No dietary info recorded</div>'}</div>
  </div>`;
}

/* ══════ GUESTS ══════ */
function rGuests(w,g){
  const fl=g.filter(x=>{
    if(S.search&&!x.name?.toLowerCase().includes(S.search.toLowerCase())&&!x.email?.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filter!=='all'&&x.status!==S.filter)return false;return true});
  let h=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <div style="flex:1 1 200px;position:relative"><input value="${S.search}" oninput="S.search=this.value;render()" placeholder="Search guests..." style="width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;background:#FAFAF7"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#BBB">🔍</span></div>
    <select onchange="S.filter=this.value;render()" style="padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;background:#FAFAF7;cursor:pointer"><option value="all"${S.filter==='all'?' selected':''}>All</option><option value="confirmed"${S.filter==='confirmed'?' selected':''}>✅ Confirmed</option><option value="pending"${S.filter==='pending'?' selected':''}>⏳ Pending</option><option value="declined"${S.filter==='declined'?' selected':''}>❌ Declined</option></select>
    <button class="bs" onclick="openImport()">📥 Import</button>
    <button class="bs" style="border-color:var(--g);color:var(--g);font-weight:700" onclick="addGuest()">+ Add Guest</button></div>`;
  h+=`<div class="cd" style="padding:0;overflow:auto"><table class="tbl"><thead><tr><th>Name</th><th>Status</th><th>+1</th><th>Table</th><th>Diet</th><th>Phone</th><th></th></tr></thead><tbody>`;
  if(!fl.length)h+=`<tr><td colspan="7" style="text-align:center;padding:30px;color:#BBB">No guests found</td></tr>`;
  else fl.forEach(x=>{const bc=x.status==='confirmed'?'bc':x.status==='declined'?'bx':'bp';const lb=x.status==='confirmed'?'✅ Confirmed':x.status==='declined'?'❌ Declined':'⏳ Pending';
    h+=`<tr style="cursor:pointer" onclick="editG('${x.id}')"><td style="font-weight:600;color:var(--d)">${x.name||'—'}</td><td><span class="bge ${bc}">${lb}</span></td><td style="text-align:center">${x.plusOnes||0}</td><td>${x.table||'—'}</td><td>${x.diet||'—'}</td><td style="font-size:11px;color:#888">${x.phone||'—'}</td><td><button class="bs bd" onclick="event.stopPropagation();delG('${x.id}')" style="padding:3px 6px;font-size:10px">🗑️</button></td></tr>`});
  h+='</tbody></table></div>';return h;
}

/* ══════ TABLES (drag & drop) ══════ */
function rTables(w,g){
  const confirmed=g.filter(x=>x.status==='confirmed'&&!x.name.startsWith('__placeholder__'));
  // Collect table names from guests AND from w.tableList
  if(!w.tableList)w.tableList=[];
  const allTableNames=new Set([...w.tableList,...confirmed.filter(x=>x.table).map(x=>x.table)]);
  const tables={};allTableNames.forEach(t=>{tables[t]=confirmed.filter(x=>x.table===t)});
  const unassigned=confirmed.filter(x=>!x.table);
  const tblNames=[...allTableNames].sort();

  let h=`<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    <button class="bs" style="border-color:var(--g);color:var(--g)" onclick="addTable()">+ New Table</button>
    <span style="font-size:11px;color:#999">${tblNames.length} table${tblNames.length!==1?'s':''} · ${confirmed.length} confirmed guests · ${unassigned.length} unassigned</span></div>`;

  h+='<div class="tv-grid">';

  // Unassigned pool
  h+=`<div class="tv-unassigned" data-table="" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropGuest(event,'')">
    <h4 style="font-size:13px;font-weight:700;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px">
      <span style="font-size:18px">📋</span> Unassigned
      <span style="font-size:10px;color:#BBB;font-weight:500;margin-left:auto">${unassigned.length} guest${unassigned.length!==1?'s':''}</span>
    </h4>`;
  unassigned.forEach(x=>{
    h+=`<div class="tv-guest" draggable="true" data-gid="${x.id}" ondragstart="dragStart(event,'${x.id}')">
      <div><span class="gn">${x.name}</span>${x.plusOnes?` <span style="font-size:9px;color:var(--g)">+${x.plusOnes}</span>`:''}</div>
      ${x.diet?`<span class="gd">🥗 ${x.diet}</span>`:''}
    </div>`});
  if(!unassigned.length)h+='<div style="text-align:center;padding:20px;color:#CCC;font-size:11px">All guests assigned! ✨</div>';
  h+='</div>';

  // Table cards
  tblNames.forEach(t=>{
    const tGuests=tables[t]||[];
    const totalPax=tGuests.reduce((s,x)=>s+(x.plusOnes||0)+1,0);
    const dietList=tGuests.filter(x=>x.diet).map(x=>x.diet);
    h+=`<div class="tv-tbl" data-table="${t}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropGuest(event,'${t}')">
    <h4>
      <span style="display:flex;align-items:center;gap:6px"><span style="font-size:18px">🪑</span> ${t}</span>
      <span>${totalPax} pax</span>
    </h4>`;
    if(!tGuests.length)h+='<div style="text-align:center;padding:16px;color:#CCC;font-size:11px;border:1px dashed var(--b);border-radius:8px;margin-bottom:6px">Drop guests here</div>';
    tGuests.forEach(x=>{
      h+=`<div class="tv-guest" draggable="true" data-gid="${x.id}" ondragstart="dragStart(event,'${x.id}')">
        <div><span class="gn">${x.name}</span>${x.plusOnes?` <span style="font-size:9px;color:var(--g)">+${x.plusOnes}</span>`:''}</div>
        ${x.diet?`<span class="gd">🥗 ${x.diet}</span>`:''}
      </div>`});
    if(dietList.length){h+=`<div style="margin-top:6px;padding:4px 8px;background:#F4F0EB;border-radius:6px;font-size:9px;color:#888">🍽️ ${dietList.join(', ')}</div>`}
    h+=`<div style="text-align:center;margin-top:6px"><button class="bs bd" onclick="delTable('${t}')" style="font-size:9px;padding:3px 8px">Remove table</button></div></div>`;
  });
  h+='</div>';return h;
}

/* ══════ CATERING ══════ */
function rCatering(w,g){
  const active=g.filter(x=>x.status!=='declined');
  const pax=active.reduce((s,x)=>s+(x.plusOnes||0)+1,0);
  const diets={};active.forEach(x=>{const d=x.diet||'No special requirements';diets[d]=(diets[d]||0)+1+(x.plusOnes||0)});
  const sorted=Object.entries(diets).sort((a,b)=>b[1]-a[1]);
  const mx=sorted.length?sorted[0][1]:1;

  let h=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:6px">Catering Summary</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px">${pax} total pax (confirmed + plus ones, excluding declined)</div>`;
  sorted.forEach(([d,n])=>{const pct=Math.round(n/pax*100);
    h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="font-weight:600;color:#555">${d}</span><span style="font-weight:700;color:var(--g)">${n} pax (${pct}%)</span></div><div style="height:10px;background:#F1F5F9;border-radius:5px;overflow:hidden"><div style="height:100%;width:${Math.round(n/mx*100)}%;background:var(--g);border-radius:5px;transition:width .5s"></div></div></div>`});
  h+='</div>';

  // Per-table diet breakdown
  const tables={};active.filter(x=>x.table).forEach(x=>{if(!tables[x.table])tables[x.table]={total:0,diets:{}};tables[x.table].total+=1+(x.plusOnes||0);const d=x.diet||'Standard';if(!tables[x.table].diets[d])tables[x.table].diets[d]=0;tables[x.table].diets[d]+=1+(x.plusOnes||0)});
  if(Object.keys(tables).length){
    h+=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Per-Table Diet Breakdown</div>
    <div style="overflow:auto"><table class="tbl"><thead><tr><th>Table</th><th>Pax</th><th>Dietary Details</th></tr></thead><tbody>`;
    Object.entries(tables).sort().forEach(([t,d])=>{
      const details=Object.entries(d.diets).map(([k,v])=>`${k}: ${v}`).join(', ');
      h+=`<tr><td style="font-weight:600">${t}</td><td style="text-align:center">${d.total}</td><td style="font-size:11px;color:#888">${details}</td></tr>`});
    h+='</tbody></table></div></div>'}
  return h;
}

/* ══════ TIMELINE ══════ */
function rTimeline(w){
  const tl=w.timeline||[];
  let h=`<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center"><button class="bs" style="border-color:var(--g);color:var(--g)" onclick="addTLItem()">+ Add Event</button><span style="font-size:11px;color:#999">${tl.length} events scheduled</span></div>`;
  if(!tl.length){h+='<div class="cd" style="text-align:center;padding:40px;color:#BBB"><div style="font-size:36px;margin-bottom:8px">📋</div>No timeline events yet. Add your first event to build the day-of schedule.</div>';return h}
  h+='<div class="cd" style="padding:24px">';
  tl.sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach((t,i)=>{
    h+=`<div class="tl-item" onclick="editTL(${i})" style="cursor:pointer">${i<tl.length-1?'<div class="tl-line"></div>':''}
    <div class="tl-dot">${i+1}</div><div class="tl-body"><div class="tl-time">${t.time||''}</div><div class="tl-title">${t.title||''}</div>
    ${t.notes?`<div class="tl-note">${t.notes}</div>`:''}${t.who?`<div style="margin-top:4px"><span style="font-size:10px;background:#F4F0EB;padding:2px 8px;border-radius:6px;color:#888">👥 ${t.who}</span></div>`:''}</div></div>`});
  h+='</div>';return h;
}

/* ══════ ACTIONS ══════ */
window.doLogin=()=>{const err=tryLogin(document.getElementById('li').value,document.getElementById('lp').value);if(err)document.getElementById('le').textContent=err;else render()};
window.openW=id=>{S.cur=id;S.tab='dashboard';S.search='';S.filter='all';render()};
window.goBack=()=>{S.cur=null;render()};
window.expPDF=()=>{const w=S.weddings.find(x=>x.id===S.cur);if(w)exportPDF(w)};
window.expCSV=()=>{const w=S.weddings.find(x=>x.id===S.cur);if(w)exportCSV(w)};
window.loadDemoData=()=>{if(S.weddings.length&&!confirm('This will add demo weddings. Continue?'))return;S.weddings.push(...genDemo());saveW();render()};
window.delW=id=>{if(!confirm('Delete this wedding and ALL guest data permanently?'))return;S.weddings=S.weddings.filter(w=>w.id!==id);saveW();render()};

window.addWedding=()=>{showModal('New Wedding',wForm({}),()=>{S.weddings.push({id:uid(),couple:document.getElementById('mC').value,date:document.getElementById('mD').value,venue:document.getElementById('mV').value,location:document.getElementById('mL').value,guests:[],timeline:[],tableList:[],createdAt:new Date().toISOString()});saveW();closeModal();render()})};
window.editWI=()=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;showModal('Edit Wedding',wForm(w),()=>{w.couple=document.getElementById('mC').value;w.date=document.getElementById('mD').value;w.venue=document.getElementById('mV').value;w.location=document.getElementById('mL').value;saveW();closeModal();render()})};
function wForm(w){return`<div class="fg"><div class="fgi"><label>Couple Names</label><input id="mC" value="${w.couple||''}"></div><div class="fgi"><label>Wedding Date</label><input id="mD" type="date" value="${w.date||''}"></div><div class="fgi"><label>Venue</label><input id="mV" value="${w.venue||''}"></div><div class="fgi"><label>Location</label><input id="mL" value="${w.location||''}"></div></div>`}

window.addGuest=()=>{showModal('Add Guest',gForm({}),()=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;if(!w.guests)w.guests=[];w.guests.push({id:uid(),name:document.getElementById('gN').value,email:document.getElementById('gE').value,phone:document.getElementById('gP').value,status:document.getElementById('gS').value,plusOnes:parseInt(document.getElementById('gO').value)||0,table:document.getElementById('gT').value,diet:document.getElementById('gD').value,notes:document.getElementById('gX').value});saveW();closeModal();render()})};
window.editG=gId=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;const g=(w.guests||[]).find(x=>x.id===gId);if(!g)return;showModal('Edit Guest',gForm(g),()=>{g.name=document.getElementById('gN').value;g.email=document.getElementById('gE').value;g.phone=document.getElementById('gP').value;g.status=document.getElementById('gS').value;g.plusOnes=parseInt(document.getElementById('gO').value)||0;g.table=document.getElementById('gT').value;g.diet=document.getElementById('gD').value;g.notes=document.getElementById('gX').value;saveW();closeModal();render()})};
window.delG=gId=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;w.guests=(w.guests||[]).filter(x=>x.id!==gId);saveW();render()};
function gForm(g){return`<div class="fg"><div class="fgi"><label>Full Name</label><input id="gN" value="${g.name||''}"></div><div class="fgi"><label>Email</label><input id="gE" type="email" value="${g.email||''}"></div><div class="fgi"><label>Phone</label><input id="gP" type="tel" value="${g.phone||''}"></div><div class="fgi"><label>Status</label><select id="gS"><option value="pending"${(g.status||'pending')==='pending'?' selected':''}>⏳ Pending</option><option value="confirmed"${g.status==='confirmed'?' selected':''}>✅ Confirmed</option><option value="declined"${g.status==='declined'?' selected':''}>❌ Declined</option></select></div><div class="fgi"><label>Plus Ones</label><input id="gO" type="number" min="0" value="${g.plusOnes||0}"></div><div class="fgi"><label>Table</label><input id="gT" value="${g.table||''}"></div><div class="fgi"><label>Dietary Needs</label><input id="gD" value="${g.diet||''}"></div><div class="fgi"><label>Notes</label><input id="gX" value="${g.notes||''}"></div></div>`}

/* Tables */
window.addTable=()=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;
  if(!w.tableList)w.tableList=[];
  const allNames=new Set([...w.tableList,...(w.guests||[]).filter(x=>x.table).map(x=>x.table)]);
  let n=1;while(allNames.has('Table '+n))n++;
  showModal('New Table',`<div class="fgi"><label>Table Name</label><input id="tblName" value="Table ${n}" style="width:100%;padding:10px 14px;border:1.5px solid var(--b);border-radius:10px;font-size:16px;text-align:center;background:#FAFAF7" onfocus="this.select()"></div>
  <div style="font-size:11px;color:#888;margin-top:6px">Tip: You can name tables creatively — "Head Table", "Family", "Friends NYC", etc.</div>`,
  ()=>{const name=document.getElementById('tblName').value.trim();if(!name)return;if(!w.tableList)w.tableList=[];if(!w.tableList.includes(name))w.tableList.push(name);saveW();closeModal();render()})};

window.delTable=name=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;
  (w.guests||[]).forEach(g=>{if(g.table===name)g.table=''});
  if(w.tableList)w.tableList=w.tableList.filter(t=>t!==name);
  w.guests=(w.guests||[]).filter(x=>!x.name.startsWith('__placeholder__'));
  saveW();render()};
window.dragStart=(e,gId)=>{e.dataTransfer.setData('text/plain',gId);S.dragGuestId=gId};
window.dropGuest=(e,table)=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');const gId=e.dataTransfer.getData('text/plain');const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;const g=(w.guests||[]).find(x=>x.id===gId);if(g){g.table=table;saveW();render()}};

/* Timeline */
window.addTLItem=()=>{showModal('Add Timeline Event',tlForm({}),()=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;if(!w.timeline)w.timeline=[];w.timeline.push({time:document.getElementById('tT').value,title:document.getElementById('tN').value,notes:document.getElementById('tO').value,who:document.getElementById('tW').value});saveW();closeModal();render()})};
window.editTL=i=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w||!w.timeline||!w.timeline[i])return;const t=w.timeline[i];showModal('Edit Timeline Event',tlForm(t)+`<div style="margin-top:8px"><button class="bs bd" onclick="delTL(${i})">🗑️ Delete Event</button></div>`,()=>{t.time=document.getElementById('tT').value;t.title=document.getElementById('tN').value;t.notes=document.getElementById('tO').value;t.who=document.getElementById('tW').value;saveW();closeModal();render()})};
window.delTL=i=>{const w=S.weddings.find(x=>x.id===S.cur);if(!w||!w.timeline)return;w.timeline.splice(i,1);saveW();closeModal();render()};
function tlForm(t){return`<div class="fg"><div class="fgi"><label>Time</label><input id="tT" type="time" value="${t.time||''}"></div><div class="fgi"><label>Event Title</label><input id="tN" value="${t.title||''}"></div></div><div class="fgi"><label>Notes / Details</label><textarea id="tO" rows="2" style="width:100%;padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;background:#FAFAF7;resize:vertical">${t.notes||''}</textarea></div><div class="fgi"><label>Team / Vendors Involved</label><input id="tW" value="${t.who||''}"></div>`}

/* Import CSV */
window.openImport=()=>{showModal('Import Guest List',`<div style="font-size:12px;color:#666;margin-bottom:10px;line-height:1.5">Upload <strong>CSV</strong> or <strong>Excel</strong>, or paste data below.<br>Columns: <code style="background:#F4F0EB;padding:2px 6px;border-radius:4px;font-size:10px">Name, Email, Phone, Status, Plus Ones, Table, Diet, Notes</code></div>
  <label class="bs" style="padding:8px 16px;cursor:pointer;border-color:var(--g);color:var(--g);display:inline-block;margin-bottom:10px">📁 Choose File<input type="file" accept=".csv,.xlsx,.xls,.tsv" style="display:none" onchange="handleFile(this)"></label>
  <textarea id="impD" rows="5" placeholder="Name,Email,Phone,Status..." style="width:100%;padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:11px;font-family:monospace;background:#FAFAF7;resize:vertical"></textarea>
  <div id="impP" style="margin-top:6px"></div>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;margin-top:6px"><input type="checkbox" id="impR">Replace all existing guests</label>`,
  ()=>{doImport()})};

window.handleFile=input=>{const f=input.files[0];if(!f)return;const ext=f.name.split('.').pop().toLowerCase();
  if(ext==='csv'||ext==='tsv'){const r=new FileReader();r.onload=e=>{document.getElementById('impD').value=e.target.result;const lines=e.target.result.trim().split('\n');document.getElementById('impP').innerHTML=`<div style="color:var(--g);font-size:11px;font-weight:600">✓ ${lines.length-1} guests detected</div>`};r.readAsText(f)}
  else if(ext==='xlsx'||ext==='xls'){const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});const csv=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);document.getElementById('impD').value=csv;const lines=csv.trim().split('\n');document.getElementById('impP').innerHTML=`<div style="color:var(--g);font-size:11px;font-weight:600">✓ ${lines.length-1} guests detected</div>`}catch{document.getElementById('impP').innerHTML='<div style="color:#C62828;font-size:11px">Error reading file</div>'}};r.readAsArrayBuffer(f)}};

function doImport(){
  const raw=document.getElementById('impD').value.trim();if(!raw)return;
  const repl=document.getElementById('impR')?.checked;const lines=raw.split('\n').filter(l=>l.trim());if(lines.length<2)return;
  const sep=lines[0].includes('\t')?'\t':',';const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const cm={};const al={name:['name','full name','guest name','nome'],email:['email','e-mail','mail'],phone:['phone','tel','mobile','telefono'],status:['status','rsvp','stato'],plusOnes:['plus ones','plus','plusones','+1'],table:['table','tavolo','seating'],diet:['diet','dietary','allergies','dieta'],notes:['notes','note','comments']};
  Object.entries(al).forEach(([f,a])=>{const i=hdrs.findIndex(h=>a.includes(h));if(i>=0)cm[f]=i});if(cm.name===undefined)cm.name=0;
  const guests=[];for(let i=1;i<lines.length;i++){const v=lines[i].split(sep).map(x=>x.trim().replace(/^"|"$/g,''));const nm=v[cm.name]||'';if(!nm)continue;
    const sr=(v[cm.status]||'').toLowerCase();let st='pending';if(sr.includes('confirm')||sr==='yes')st='confirmed';else if(sr.includes('declin')||sr==='no')st='declined';
    guests.push({id:uid(),name:nm,email:v[cm.email]||'',phone:v[cm.phone]||'',status:st,plusOnes:parseInt(v[cm.plusOnes])||0,table:v[cm.table]||'',diet:v[cm.diet]||'',notes:v[cm.notes]||''});}
  if(!guests.length)return;const w=S.weddings.find(x=>x.id===S.cur);if(!w)return;
  if(repl)w.guests=guests;else{if(!w.guests)w.guests=[];w.guests.push(...guests)}saveW();closeModal();render()}

/* Modal */
function showModal(title,content,onSave){const o=document.createElement('div');o.className='mo';o.onclick=e=>{if(e.target===o)closeModal()};
  o.innerHTML=`<div class="md"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3>${title}</h3><button class="bs" onclick="closeModal()" style="font-size:18px;border:none;background:none;color:#AAA">×</button></div>${content}<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="bs" onclick="closeModal()">Cancel</button><button class="bs" id="msv" style="border-color:var(--g);background:var(--g);color:#fff;font-weight:700;padding:8px 24px">Save</button></div></div>`;
  document.body.appendChild(o);o.querySelector('#msv').onclick=onSave}
window.closeModal=()=>{const m=document.querySelector('.mo');if(m)m.remove()};
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!S.logged)doLogin();if(e.key==='Escape')closeModal()});

render();
</script>
