<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Guest Manager — Roberta Torresan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --gold: #9E7C4E; --dark: #1A1A1A; --cream: #FAF8F5; --accent: #B8956A; --border: #E8E3DC; --ff: 'DM Sans', sans-serif; --pf: 'Playfair Display', serif; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--ff); background: #fff; color: var(--dark); min-height: 100vh; }
button { font-family: var(--ff); cursor: pointer; transition: all 0.2s; }
button:active { transform: scale(0.97); }
input, select, textarea { font-family: var(--ff); outline: none; }

/* Login */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); padding: 20px; }
.login-card { background: #fff; border-radius: 20px; padding: 40px 36px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center; border: 1px solid var(--border); }
.login-card img { max-width: 200px; margin-bottom: 16px; }
.login-card h2 { font-family: var(--pf); color: var(--dark); font-size: 20px; margin-bottom: 4px; }
.login-card .sub { color: #999; font-size: 12px; margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase; }
.login-card input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; margin-bottom: 12px; background: #FAFAF7; transition: border-color 0.2s; }
.login-card input:focus { border-color: var(--gold); }
.login-card .btn-gold { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; font-size: 14px; font-weight: 700; margin-top: 6px; }
.login-card .btn-gold:disabled { background: #DDD; color: #AAA; cursor: default; }
.login-card .err { color: #C62828; font-size: 12px; margin-top: 8px; }
.login-card .hint { color: #BBB; font-size: 10px; margin-top: 12px; line-height: 1.5; }

/* App shell */
.app-header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.app-header img { height: 40px; }
.app-header .user-info { display: flex; align-items: center; gap: 10px; }
.app-header .user-badge { font-size: 11px; color: #888; background: #F4F0EB; padding: 4px 12px; border-radius: 8px; }
.btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 600; border: 1.5px solid var(--border); background: #fff; color: #666; }
.btn-sm:hover { border-color: var(--gold); color: var(--gold); }
.btn-danger { border-color: #FCA5A5; background: #FEF2F2; color: #C62828; }

/* Main content */
.main { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }
.card { background: #fff; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 14px; }

/* Wedding list */
.wedding-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 20px; }
.wedding-tile { background: #fff; border-radius: 16px; border: 1.5px solid var(--border); padding: 18px; cursor: pointer; transition: all 0.2s; }
.wedding-tile:hover { border-color: var(--gold); box-shadow: 0 4px 16px rgba(158,124,78,0.12); }
.wedding-tile.active { border-color: var(--gold); background: #FDFBF8; }
.wedding-tile h3 { font-family: var(--pf); font-size: 16px; color: var(--dark); margin-bottom: 4px; }
.wedding-tile .meta { font-size: 11px; color: #999; }
.wedding-tile .stats { display: flex; gap: 12px; margin-top: 10px; }
.wedding-tile .stat { text-align: center; }
.wedding-tile .stat-val { font-size: 18px; font-weight: 800; color: var(--gold); }
.wedding-tile .stat-lbl { font-size: 9px; color: #AAA; text-transform: uppercase; letter-spacing: 1px; }

/* Tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 18px; border-radius: 10px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); background: #fff; color: #888; }
.tab.active { border-color: var(--gold); background: var(--gold); color: #fff; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { padding: 10px 12px; text-align: left; font-weight: 700; color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1.5px solid var(--border); background: #FAFAF7; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid #F4F0EB; color: #555; }
.tbl tr:hover td { background: #FDFBF8; }
.tbl .badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; }
.badge-confirmed { background: #E8F5E9; color: #2E7D32; }
.badge-pending { background: #FFF8E1; color: #F57F17; }
.badge-declined { background: #FFEBEE; color: #C62828; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.form-group { margin-bottom: 10px; }
.form-group label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: #FAFAF7; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: 20px; max-width: 520px; width: 100%; max-height: 90vh; overflow: auto; padding: 24px; border: 1px solid var(--border); }
.modal h3 { font-family: var(--pf); font-size: 18px; margin-bottom: 16px; }

/* Stats bar */
.stats-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.stats-bar .kpi { text-align: center; flex: 1 1 70px; padding: 12px 8px; background: #FDFBF8; border-radius: 12px; border: 1px solid var(--border); }
.stats-bar .kpi-val { font-size: 22px; font-weight: 800; color: var(--gold); }
.stats-bar .kpi-lbl { font-size: 9px; color: #AAA; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Expired badge */
.expired-badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 9px; font-weight: 700; background: #FFEBEE; color: #C62828; margin-left: 6px; }

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .wedding-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div id="app"></div>

<script>
/* ══════════ STORAGE ══════════ */
const LS_PREFIX = 'rt_gm_';
const getLS = (k, d) => { try { const v = localStorage.getItem(LS_PREFIX + k); return v ? JSON.parse(v) : d; } catch { return d; } };
const setLS = (k, v) => { try { localStorage.setItem(LS_PREFIX + k, JSON.stringify(v)); } catch {} };
const rmLS = (k) => { try { localStorage.removeItem(LS_PREFIX + k); } catch {} };

/* ══════════ STATE ══════════ */
let state = {
  loggedIn: false,
  userId: '',
  weddings: [],
  currentWedding: null,
  tab: 'guests',
  modal: null, // null | 'addGuest' | 'editGuest' | 'addWedding' | 'editWedding'
  editingGuest: null,
  search: '',
  filterStatus: 'all',
};

function getWeddingKey(userId) { return 'weddings_' + userId; }
function loadWeddings() { state.weddings = getLS(getWeddingKey(state.userId), []); }
function saveWeddings() { setLS(getWeddingKey(state.userId), state.weddings); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ══════════ AUTH ══════════ */
function tryLogin(id, pw) {
  if (!id || !pw) return 'Please enter both ID and password';
  const key = 'auth_' + id.toLowerCase().trim();
  const stored = getLS(key, null);
  if (stored) {
    if (stored.pw !== pw) return 'Incorrect password';
  } else {
    // New user — register
    setLS(key, { pw, created: new Date().toISOString() });
  }
  state.userId = id.toLowerCase().trim();
  state.loggedIn = true;
  setLS('lastUser', state.userId);
  loadWeddings();
  return null;
}

function logout() {
  state.loggedIn = false;
  state.userId = '';
  state.weddings = [];
  state.currentWedding = null;
  render();
}

/* ══════════ WEDDING HELPERS ══════════ */
function isExpired(w) {
  if (!w.date) return false;
  const d = new Date(w.date + 'T23:59:59');
  return d < new Date();
}

function getGuests(wId) {
  const w = state.weddings.find(x => x.id === wId);
  return w ? (w.guests || []) : [];
}

function weddingStats(w) {
  const g = w.guests || [];
  const conf = g.filter(x => x.status === 'confirmed').length;
  const pend = g.filter(x => x.status === 'pending').length;
  const decl = g.filter(x => x.status === 'declined').length;
  const totalPax = g.filter(x => x.status === 'confirmed').reduce((s, x) => s + (x.plusOnes || 0) + 1, 0);
  return { total: g.length, conf, pend, decl, totalPax };
}

/* ══════════ PDF EXPORT ══════════ */
function exportPDF(w) {
  const g = w.guests || [];
  const stats = weddingStats(w);
  const confirmed = g.filter(x => x.status === 'confirmed');
  const pending = g.filter(x => x.status === 'pending');
  const declined = g.filter(x => x.status === 'declined');

  let html = `<html><head><style>
    body { font-family: 'Helvetica Neue', sans-serif; padding: 40px; color: #1A1A1A; }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
    .stats { display: flex; gap: 20px; margin-bottom: 24px; }
    .stat { text-align: center; padding: 12px 20px; background: #F8F6F3; border-radius: 8px; }
    .stat-val { font-size: 24px; font-weight: 800; color: #9E7C4E; }
    .stat-lbl { font-size: 10px; color: #999; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
    th { padding: 8px; text-align: left; border-bottom: 2px solid #E8E3DC; font-size: 10px; text-transform: uppercase; color: #888; }
    td { padding: 7px 8px; border-bottom: 1px solid #F0ECE6; }
    h3 { margin: 20px 0 8px; font-size: 14px; color: #9E7C4E; }
    .footer { margin-top: 30px; font-size: 10px; color: #BBB; text-align: center; }
  </style></head><body>`;
  html += `<h1>${w.couple || 'Wedding'}</h1>`;
  html += `<div class="sub">${w.date ? new Date(w.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : ''} ${w.venue ? '· ' + w.venue : ''}</div>`;
  html += `<div class="stats">`;
  html += `<div class="stat"><div class="stat-val">${stats.total}</div><div class="stat-lbl">Total</div></div>`;
  html += `<div class="stat"><div class="stat-val">${stats.conf}</div><div class="stat-lbl">Confirmed</div></div>`;
  html += `<div class="stat"><div class="stat-val">${stats.totalPax}</div><div class="stat-lbl">Total Pax</div></div>`;
  html += `<div class="stat"><div class="stat-val">${stats.pend}</div><div class="stat-lbl">Pending</div></div>`;
  html += `<div class="stat"><div class="stat-val">${stats.decl}</div><div class="stat-lbl">Declined</div></div>`;
  html += `</div>`;

  const makeTable = (list, title) => {
    if (list.length === 0) return '';
    let t = `<h3>${title} (${list.length})</h3><table><tr><th>Name</th><th>Email</th><th>Phone</th><th>Plus Ones</th><th>Table</th><th>Diet</th><th>Notes</th></tr>`;
    list.forEach(g => {
      t += `<tr><td>${g.name||''}</td><td>${g.email||''}</td><td>${g.phone||''}</td><td>${g.plusOnes||0}</td><td>${g.table||''}</td><td>${g.diet||''}</td><td>${g.notes||''}</td></tr>`;
    });
    t += '</table>';
    return t;
  };

  html += makeTable(confirmed, '✅ Confirmed');
  html += makeTable(pending, '⏳ Pending');
  html += makeTable(declined, '❌ Declined');
  html += `<div class="footer">Generated by Roberta Torresan Wedding Guest Manager · ${new Date().toLocaleDateString()}</div>`;
  html += '</body></html>';

  const win = window.open('', '_blank');
  if (win) {
    win.document.write(html);
    win.document.close();
    setTimeout(() => win.print(), 500);
  }
}

/* ══════════ CSV EXPORT ══════════ */
function exportCSV(w) {
  const g = w.guests || [];
  const esc = v => { const s = String(v||''); return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s; };
  const headers = ['Name','Email','Phone','Status','Plus Ones','Table','Diet','Notes'];
  const csv = [headers.join(','), ...g.map(x => [x.name,x.email,x.phone,x.status,x.plusOnes,x.table,x.diet,x.notes].map(esc).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${(w.couple||'wedding').replace(/\s+/g,'_')}_guests.csv`;
  a.click();
}

/* ══════════ RENDER ══════════ */
function render() {
  const app = document.getElementById('app');
  if (!state.loggedIn) { renderLogin(app); return; }
  if (!state.currentWedding) { renderWeddingList(app); return; }
  renderGuestManager(app);
}

function renderLogin(app) {
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <img src="${LOGO}" alt="Roberta Torresan">
        <h2>Guest Manager</h2>
        <div class="sub">Login or Create Account</div>
        <input id="loginId" type="text" placeholder="Your ID (e.g. your name)" autocomplete="username">
        <input id="loginPw" type="password" placeholder="Password" autocomplete="current-password">
        <button class="btn-gold" onclick="handleLogin()">Sign In</button>
        <div id="loginErr" class="err"></div>
        <div class="hint">First time? Enter a new ID and password to create your account.<br>Your data is stored locally in this browser only.</div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('loginId')?.focus(), 100);
}

function renderWeddingList(app) {
  const weddings = state.weddings;
  const active = weddings.filter(w => !isExpired(w));
  const expired = weddings.filter(w => isExpired(w));

  let html = `
    <div class="app-header">
      <img src="${LOGO}" alt="RT" style="height:36px">
      <div class="user-info">
        <span class="user-badge">👤 ${state.userId}</span>
        <button class="btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </div>
    <div class="main">
      <div style="text-align:center;margin-bottom:20px">
        <h1 style="font-family:var(--pf);font-size:24px;color:var(--dark);margin-bottom:4px">Your Weddings</h1>
        <p style="color:#999;font-size:12px">${weddings.length} wedding${weddings.length!==1?'s':''} managed</p>
      </div>
      <div style="text-align:right;margin-bottom:14px">
        <button class="btn-sm" style="border-color:var(--gold);color:var(--gold);font-weight:700;padding:8px 20px" onclick="openAddWedding()">+ New Wedding</button>
      </div>`;

  if (active.length > 0) {
    html += `<div style="font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Active</div>`;
    html += '<div class="wedding-grid">';
    active.forEach(w => {
      const s = weddingStats(w);
      html += `<div class="wedding-tile" onclick="selectWedding('${w.id}')">
        <h3>${w.couple || 'Untitled'}</h3>
        <div class="meta">${w.date ? new Date(w.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'No date'} ${w.venue ? '· '+w.venue : ''}</div>
        <div class="stats">
          <div class="stat"><div class="stat-val">${s.total}</div><div class="stat-lbl">Guests</div></div>
          <div class="stat"><div class="stat-val">${s.conf}</div><div class="stat-lbl">Confirmed</div></div>
          <div class="stat"><div class="stat-val">${s.totalPax}</div><div class="stat-lbl">Total Pax</div></div>
          <div class="stat"><div class="stat-val">${s.pend}</div><div class="stat-lbl">Pending</div></div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  if (expired.length > 0) {
    html += `<div style="font-size:12px;font-weight:700;color:#C62828;text-transform:uppercase;letter-spacing:2px;margin:20px 0 8px">Past Weddings</div>`;
    html += '<div class="wedding-grid">';
    expired.forEach(w => {
      const s = weddingStats(w);
      html += `<div class="wedding-tile" style="opacity:0.6;border-style:dashed">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h3>${w.couple || 'Untitled'}<span class="expired-badge">PAST</span></h3>
            <div class="meta">${w.date ? new Date(w.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : ''}</div>
          </div>
          <button class="btn-sm btn-danger" onclick="event.stopPropagation();deleteWedding('${w.id}')" title="Delete this wedding and all its data">🗑️</button>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-val">${s.total}</div><div class="stat-lbl">Guests</div></div>
          <div class="stat"><div class="stat-val">${s.conf}</div><div class="stat-lbl">Conf.</div></div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  if (weddings.length === 0) {
    html += `<div style="text-align:center;padding:60px 20px;color:#BBB">
      <div style="font-size:48px;margin-bottom:12px">💒</div>
      <div style="font-size:14px;font-weight:500">No weddings yet</div>
      <div style="font-size:12px;margin-top:6px">Click "+ New Wedding" to get started</div>
    </div>`;
  }

  html += '</div>';
  app.innerHTML = html;
}

function renderGuestManager(app) {
  const w = state.weddings.find(x => x.id === state.currentWedding);
  if (!w) { state.currentWedding = null; render(); return; }
  const guests = w.guests || [];
  const s = weddingStats(w);
  const filtered = guests.filter(g => {
    if (state.search && !g.name?.toLowerCase().includes(state.search.toLowerCase()) && !g.email?.toLowerCase().includes(state.search.toLowerCase())) return false;
    if (state.filterStatus !== 'all' && g.status !== state.filterStatus) return false;
    return true;
  });

  let html = `
    <div class="app-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-sm" onclick="goBack()">← Back</button>
        <div>
          <div style="font-size:14px;font-weight:700;font-family:var(--pf);color:var(--dark)">${w.couple || 'Wedding'}</div>
          <div style="font-size:10px;color:#999">${w.date ? new Date(w.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : ''} ${w.venue ? '· '+w.venue : ''}</div>
        </div>
      </div>
      <div class="user-info">
        <button class="btn-sm" onclick="editWeddingInfo()">✏️ Edit Info</button>
        <button class="btn-sm" onclick="exportPDFCurrent()">📄 PDF</button>
        <button class="btn-sm" onclick="exportCSVCurrent()">📤 CSV</button>
      </div>
    </div>
    <div class="main">
      <div class="stats-bar">
        <div class="kpi"><div class="kpi-val">${s.total}</div><div class="kpi-lbl">Total</div></div>
        <div class="kpi"><div class="kpi-val" style="color:#2E7D32">${s.conf}</div><div class="kpi-lbl">Confirmed</div></div>
        <div class="kpi"><div class="kpi-val" style="color:var(--gold)">${s.totalPax}</div><div class="kpi-lbl">Total Pax</div></div>
        <div class="kpi"><div class="kpi-val" style="color:#F57F17">${s.pend}</div><div class="kpi-lbl">Pending</div></div>
        <div class="kpi"><div class="kpi-val" style="color:#C62828">${s.decl}</div><div class="kpi-lbl">Declined</div></div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
        <div style="flex:1 1 200px;position:relative">
          <input id="searchInput" value="${state.search}" oninput="state.search=this.value;render()" placeholder="Search guests..." style="width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#FAFAF7">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#BBB">🔍</span>
        </div>
        <select onchange="state.filterStatus=this.value;render()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#FAFAF7;cursor:pointer">
          <option value="all" ${state.filterStatus==='all'?'selected':''}>All Status</option>
          <option value="confirmed" ${state.filterStatus==='confirmed'?'selected':''}>✅ Confirmed</option>
          <option value="pending" ${state.filterStatus==='pending'?'selected':''}>⏳ Pending</option>
          <option value="declined" ${state.filterStatus==='declined'?'selected':''}>❌ Declined</option>
        </select>
        <button class="btn-sm" style="border-color:var(--gold);color:var(--gold);font-weight:700;padding:8px 18px" onclick="openAddGuest()">+ Add Guest</button>
      </div>

      <div class="card" style="padding:0;overflow:auto">
        <table class="tbl">
          <thead><tr><th>Name</th><th>Status</th><th>+Ones</th><th>Table</th><th>Diet</th><th>Phone</th><th></th></tr></thead>
          <tbody>`;

  if (filtered.length === 0) {
    html += `<tr><td colspan="7" style="text-align:center;padding:30px;color:#BBB">No guests ${state.search || state.filterStatus !== 'all' ? 'match your filters' : 'yet — add your first guest'}</td></tr>`;
  } else {
    filtered.forEach(g => {
      const badge = g.status === 'confirmed' ? 'badge-confirmed' : g.status === 'declined' ? 'badge-declined' : 'badge-pending';
      const statusLabel = g.status === 'confirmed' ? '✅ Confirmed' : g.status === 'declined' ? '❌ Declined' : '⏳ Pending';
      html += `<tr style="cursor:pointer" onclick="editGuest('${g.id}')">
        <td style="font-weight:600;color:var(--dark)">${g.name||'—'}</td>
        <td><span class="badge ${badge}">${statusLabel}</span></td>
        <td style="text-align:center">${g.plusOnes||0}</td>
        <td>${g.table||'—'}</td>
        <td>${g.diet||'—'}</td>
        <td style="font-size:11px;color:#888">${g.phone||'—'}</td>
        <td><button class="btn-sm btn-danger" onclick="event.stopPropagation();deleteGuest('${g.id}')" style="padding:4px 8px;font-size:10px">🗑️</button></td>
      </tr>`;
    });
  }

  html += `</tbody></table></div></div>`;
  app.innerHTML = html;
}

/* ══════════ ACTIONS ══════════ */
window.handleLogin = () => {
  const id = document.getElementById('loginId').value;
  const pw = document.getElementById('loginPw').value;
  const err = tryLogin(id, pw);
  if (err) { document.getElementById('loginErr').textContent = err; }
  else render();
};

window.selectWedding = (id) => { state.currentWedding = id; state.search = ''; state.filterStatus = 'all'; render(); };
window.goBack = () => { state.currentWedding = null; render(); };
window.exportPDFCurrent = () => { const w = state.weddings.find(x => x.id === state.currentWedding); if (w) exportPDF(w); };
window.exportCSVCurrent = () => { const w = state.weddings.find(x => x.id === state.currentWedding); if (w) exportCSV(w); };

window.openAddWedding = () => {
  showModal('New Wedding', `
    <div class="form-grid">
      <div class="form-group"><label>Couple Names</label><input id="mCouple" placeholder="e.g. Emma & Luca"></div>
      <div class="form-group"><label>Wedding Date</label><input id="mDate" type="date"></div>
      <div class="form-group"><label>Venue</label><input id="mVenue" placeholder="e.g. Villa Cimbrone"></div>
      <div class="form-group"><label>Location</label><input id="mLoc" placeholder="e.g. Ravello, Italy"></div>
    </div>`,
    () => {
      const w = { id: uid(), couple: document.getElementById('mCouple').value, date: document.getElementById('mDate').value, venue: document.getElementById('mVenue').value, location: document.getElementById('mLoc').value, guests: [], createdAt: new Date().toISOString() };
      state.weddings.push(w); saveWeddings(); closeModal(); render();
    }
  );
};

window.editWeddingInfo = () => {
  const w = state.weddings.find(x => x.id === state.currentWedding);
  if (!w) return;
  showModal('Edit Wedding', `
    <div class="form-grid">
      <div class="form-group"><label>Couple Names</label><input id="mCouple" value="${w.couple||''}"></div>
      <div class="form-group"><label>Wedding Date</label><input id="mDate" type="date" value="${w.date||''}"></div>
      <div class="form-group"><label>Venue</label><input id="mVenue" value="${w.venue||''}"></div>
      <div class="form-group"><label>Location</label><input id="mLoc" value="${w.location||''}"></div>
    </div>`,
    () => {
      w.couple = document.getElementById('mCouple').value;
      w.date = document.getElementById('mDate').value;
      w.venue = document.getElementById('mVenue').value;
      w.location = document.getElementById('mLoc').value;
      saveWeddings(); closeModal(); render();
    }
  );
};

window.deleteWedding = (id) => {
  if (!confirm('Delete this wedding and ALL its guest data permanently?')) return;
  state.weddings = state.weddings.filter(w => w.id !== id);
  saveWeddings(); render();
};

window.openAddGuest = () => {
  showModal('Add Guest', guestForm({}), () => {
    const w = state.weddings.find(x => x.id === state.currentWedding);
    if (!w) return;
    if (!w.guests) w.guests = [];
    w.guests.push({ id: uid(), name: document.getElementById('gName').value, email: document.getElementById('gEmail').value, phone: document.getElementById('gPhone').value, status: document.getElementById('gStatus').value, plusOnes: parseInt(document.getElementById('gPlus').value)||0, table: document.getElementById('gTable').value, diet: document.getElementById('gDiet').value, notes: document.getElementById('gNotes').value });
    saveWeddings(); closeModal(); render();
  });
};

window.editGuest = (gId) => {
  const w = state.weddings.find(x => x.id === state.currentWedding);
  if (!w) return;
  const g = (w.guests||[]).find(x => x.id === gId);
  if (!g) return;
  showModal('Edit Guest', guestForm(g), () => {
    g.name = document.getElementById('gName').value;
    g.email = document.getElementById('gEmail').value;
    g.phone = document.getElementById('gPhone').value;
    g.status = document.getElementById('gStatus').value;
    g.plusOnes = parseInt(document.getElementById('gPlus').value)||0;
    g.table = document.getElementById('gTable').value;
    g.diet = document.getElementById('gDiet').value;
    g.notes = document.getElementById('gNotes').value;
    saveWeddings(); closeModal(); render();
  });
};

window.deleteGuest = (gId) => {
  const w = state.weddings.find(x => x.id === state.currentWedding);
  if (!w) return;
  w.guests = (w.guests||[]).filter(x => x.id !== gId);
  saveWeddings(); render();
};

function guestForm(g) {
  return `<div class="form-grid">
    <div class="form-group"><label>Full Name</label><input id="gName" value="${g.name||''}" placeholder="Guest name"></div>
    <div class="form-group"><label>Email</label><input id="gEmail" type="email" value="${g.email||''}"></div>
    <div class="form-group"><label>Phone</label><input id="gPhone" type="tel" value="${g.phone||''}"></div>
    <div class="form-group"><label>Status</label><select id="gStatus">
      <option value="pending" ${(g.status||'pending')==='pending'?'selected':''}>⏳ Pending</option>
      <option value="confirmed" ${g.status==='confirmed'?'selected':''}>✅ Confirmed</option>
      <option value="declined" ${g.status==='declined'?'selected':''}>❌ Declined</option>
    </select></div>
    <div class="form-group"><label>Plus Ones</label><input id="gPlus" type="number" min="0" value="${g.plusOnes||0}"></div>
    <div class="form-group"><label>Table #</label><input id="gTable" value="${g.table||''}"></div>
    <div class="form-group"><label>Dietary Needs</label><input id="gDiet" value="${g.diet||''}" placeholder="e.g. Vegetarian, Gluten-free"></div>
    <div class="form-group"><label>Notes</label><input id="gNotes" value="${g.notes||''}"></div>
  </div>`;
}

/* ══════════ MODAL ══════════ */
function showModal(title, content, onSave) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>${title}</h3>
      <button class="btn-sm" onclick="closeModal()" style="font-size:18px;border:none;background:none;color:#AAA">×</button>
    </div>
    ${content}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-sm" id="modalSave" style="border-color:var(--gold);background:var(--gold);color:#fff;font-weight:700;padding:8px 24px">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modalSave').onclick = onSave;
}

window.closeModal = () => {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
};

/* ══════════ KEYBOARD ══════════ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !state.loggedIn) handleLogin();
  if (e.key === 'Escape') closeModal();
});

/* ══════════ INIT ══════════ */
render();
</script>
</body>
</html>
